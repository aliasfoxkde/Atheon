# Pre-commit hooks for Atheon
# See https://pre-commit.com for more information

repos:
  - repo: local
    hooks:
      - id: go-test
        name: Go Test
        entry: go test ./...
        language: system
        pass_filenames: false
        always_run: true

      - id: go-vet
        name: Go Vet
        entry: go vet ./...
        language: system
        pass_filenames: false
        always_run: true

      - id: go-fmt
        name: Go Format Check
        entry: bash -c 'if [ -n \"$(gofmt -s .)\" ]; then gofmt -d .; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true

      - id: go-build
        name: Go Build
        entry: go build -v
        language: system
        pass_filenames: false
        always_run: true

      - id: go-mod-tidy
        name: Go Mod Tidy
        entry: go mod tidy
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        args: ['--markdown-linebreak-ext=md']

      - id: end-of-file-fixer
        name: Fix End of Files

      - id: check-yaml
        name: Check YAML
        args: ['--allow-multiple-documents']

      - id: check-added-large-files
        name: Check for Large Files
        args: ['--maxkb=1000', '--enforce-all']

      - id: check-merge-conflict
        name: Check Merge Conflicts

      - id: check-case-conflict
        name: Check Case Conflict

      - id: detect-private-key
        name: Detect Private Keys
        args: ['--allow-text=BEGIN OPENSSH PRIVATE']

      - id: detect-aws-credentials
        name: Detect AWS Credentials

      - id: detect-github-token
        name: Detect GitHub Token

  - repo: https://github.com/golangci/golangci-lint
    rev: v1.59.1
    hooks:
      - id: golangci-lint
        name: GolangCI-Lint
        entry: golangci-lint run --timeout=5m --fix
        args: ['--build-tags', '']
        language: system
        types: [go]
        pass_filenames: false