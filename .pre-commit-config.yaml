# Pre-commit hooks for Atheon-Enhanced
# See https://pre-commit.com for more information
# Install: ./scripts/install-hooks.sh

repos:
  - repo: local
    hooks:
      - id: go-test
        name: Go Test
        entry: go test ./... -p 1
        language: system
        pass_filenames: false
        always_run: true

      - id: go-vet
        name: Go Vet
        entry: go vet ./...
        language: system
        pass_filenames: false
        always_run: true

      - id: go-fmt
        name: Go Format Check
        entry: bash -c 'UNFORMATTED=$(gofmt -l .); if [ -n "$UNFORMATTED" ]; then echo "$UNFORMATTED"; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true

      - id: go-build
        name: Go Build
        entry: go build ./...
        language: system
        pass_filenames: false
        always_run: true

      - id: go-mod-tidy
        name: Go Mod Tidy
        entry: go mod tidy
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: ['--markdown-linebreak-ext=md']

      - id: end-of-file-fixer

      - id: check-yaml
        args: ['--allow-multiple-documents']

      - id: check-added-large-files
        args: ['--maxkb=1000', '--enforce-all']

      - id: check-merge-conflict

      - id: check-case-conflict

      - id: detect-private-key

      - id: detect-aws-credentials

  - repo: https://github.com/golangci/golangci-lint
    rev: v1.64.8
    hooks:
      - id: golangci-lint
        name: GolangCI-Lint
        language: system
        types: [go]
        pass_filenames: false
        args: ['run', '--timeout=5m']
