name: Scheduled Release

# Build releases on 10th and 21st of each month as documented in README
on:
  schedule:
    - cron: '0 12 10,21 * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g., v1.4.0-enhanced). Leave blank to auto-increment patch from last release.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    if: github.repository == 'aliasfoxkde/Atheon-Enhanced'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            # Normalize: ensure v prefix and -enhanced suffix
            RAW="${{ inputs.version }}"
            RAW="${RAW#v}"           # strip leading v if present
            RAW="${RAW%-enhanced}"   # strip -enhanced if present
            TAG="v${RAW}-enhanced"
          else
            # Auto-increment patch from last v*-enhanced tag
            LAST_TAG=$(git tag --list 'v*-enhanced' --sort=-version:refname | head -1)
            if [ -z "$LAST_TAG" ]; then
              LAST_TAG="v1.0.0-enhanced"
            fi
            BASE="${LAST_TAG#v}"
            BASE="${BASE%-enhanced}"
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
            NEXT_PATCH=$((PATCH + 1))
            TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}-enhanced"
          fi

          # Abort if tag already exists
          if git tag --list | grep -qx "$TAG"; then
            echo "ERROR: tag $TAG already exists — bump version manually or delete the existing tag"
            exit 1
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Releasing: $TAG"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "${{ vars.GO_VERSION || '1.23' }}"

      - name: Validate before tagging
        run: |
          go build ./...
          go test ./... -timeout 15m -p 1
          echo "All checks passed — safe to tag"

      - name: Create and push release tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          echo "Pushed ${{ steps.version.outputs.tag }} — publish.yml will now build and attach binaries via goreleaser"
          echo "Check: https://github.com/${{ github.repository }}/actions"
