name: Scheduled Release

# Build releases on 10th and 21st of each month as documented in README
on:
  schedule:
    - cron: '0 12 10,21 * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g., 0.4.1)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.repository == 'aliasfoxkde/Atheon-Enhanced'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            # Calculate next version based on date
            DATE_VERSION="0.4.$(date +%y%m%d)"
            VERSION="${DATE_VERSION}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building release: $VERSION"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.23'

      - name: Validate before tagging
        run: |
          go build ./...
          go test ./... -timeout 15m -p 1
          echo "All checks passed — safe to tag"

      - name: Create version tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Wait for build to start
        run: sleep 5

      - name: Check release status
        run: |
          echo "Release tag v${{ steps.version.outputs.version }} pushed"
          echo "GoReleaser will automatically build and publish the release"
          echo "Check Actions tab for build progress: https://github.com/${{ github.repository }}/actions"
