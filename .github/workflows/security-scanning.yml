name: Security Scanning and Vulnerability Assessment

on:
  push:
    branches: [ main, stable/**, 'infra/**' ]
  pull_request:
    branches: [ main, stable/** ]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write
  statuses: read
  pull-requests: read

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          languages: go
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: "/language:go"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "${{ vars.GO_VERSION || '1.23' }}"
          cache: true

      - name: Build Atheon
        run: go build -o atheon ./cmd/atheon

      - name: Scan codebase with Atheon
        run: |
          ./atheon . --all --json > security-findings.json 2>&1 || true
          if [ ! -s security-findings.json ]; then
            echo '{}' > security-findings.json
          fi

      - name: Analyze findings
        run: |
          echo "=== Security Scan Analysis ==="

          CRITICAL=$(jq '[.[] | select(.pattern | test("api-key|secret|token|password"; "i"))] | length' security-findings.json 2>/dev/null || echo "0")
          echo "Critical security issues: $CRITICAL"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "⚠️  Critical findings detected:"
            jq -r '.[] | select(.pattern | test("api-key|secret|token|password"; "i")) | "\(.pattern) - \(.file):\(.line)"' security-findings.json 2>/dev/null || true
          fi

          TOTAL=$(jq 'length' security-findings.json 2>/dev/null || echo "0")
          echo "Total findings: $TOTAL"

      - name: Check for leaked credentials
        run: |
          echo "=== Credential Leak Detection ==="

          # Check for common credential patterns
          ./atheon . --categories=secrets --json 2>/dev/null > credentials.json || true

          # Check if output is actually JSON (handle plain text "no findings" response)
          if ! jq empty credentials.json >/dev/null 2>&1; then
            echo "No credential leaks detected (plain text output)"
            rm -f credentials.json
          else
            CRED_COUNT=$(jq 'length' credentials.json)
            echo "Credentials found: $CRED_COUNT"

            if [ "$CRED_COUNT" -gt 0 ]; then
              echo "⚠️  Potential credential leaks detected (see security-findings.json for details)"
              jq '.' credentials.json 2>/dev/null || true
            else
              echo "✅ No credential leaks detected"
            fi
            rm -f credentials.json
          fi

      - name: Scan for API keys specifically
        run: |
          echo "=== API Key Detection ==="

          # Check for various API key patterns
          ./atheon . --all | grep -i "api-key\|token\|secret\|password" || echo "No API keys found"

      - name: Upload scan results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: security-scan-results
          path: security-findings.json
          retention-days: 30

  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true

      - name: Check for outdated dependencies
        run: |
          go list -u -m all | tee outdated.txt

          if [ -s outdated.txt ]; then
            echo "⚠️  Outdated dependencies detected:"
            cat outdated.txt
          else
            echo "✅ All dependencies are up to date"
          fi

  code-quality-scan:
    name: Code Quality Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "${{ vars.GO_VERSION || '1.23' }}"
          cache: true

      - name: Check for security anti-patterns
        run: |
          echo "=== Security Anti-Patterns ==="

          # Check for dangerous functions
          grep -r "exec\|system\|eval" core/*.go | grep -v "test" || echo "No dangerous functions found"

          # Check for hardcoded secrets in tests
          grep -r "sk-[A-Za-z0-9]" core/*_test.go || echo "No fake secrets in tests"

          # Check for debug statements in production code
          grep -r "fmt\.Debug\|log\.Debug" core/*.go | grep -v "_test.go" || echo "No debug statements found"

      - name: Validate error handling
        run: |
          echo "=== Error Handling Validation ==="

          # Check for naked returns
          grep -rn "return err" core/*.go | grep -v "return nil" || echo "All errors properly handled"

      - name: Check for sensitive data exposure
        run: |
          echo "=== Sensitive Data Exposure Check ==="

          # Check for sensitive data in logs
          grep -rn "log.*\(.*password" core/*.go || echo "No sensitive data in logs"

          # Check for sensitive data in error messages
          grep -rn "Error.*\(.*password" core/*.go || echo "No sensitive data in errors"

  self-validation:
    name: Atheon Self-Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "${{ vars.GO_VERSION || '1.23' }}"
          cache: true

      - name: Run comprehensive self-scan
        run: |
          chmod +x .github/scripts/self-scan.sh
          ./.github/scripts/self-scan.sh

      - name: Validate pattern quality
        run: |
          echo "=== Pattern Quality Validation ==="

          go build -o atheon ./cmd/atheon
          COUNT=$(./atheon list | tail -1 | grep -oE '[0-9]+' | head -1)
          echo "Pattern bundle: ${COUNT} patterns"
          if [ "${COUNT}" -lt 250 ]; then
            echo "ERROR: Expected ≥250 patterns, got ${COUNT}"
            exit 1
          fi

      - name: Test pattern loading
        run: |
          echo "=== Pattern Loading Test ==="

          go test ./... -p 1 -run TestPatternLoading
          go test ./... -p 1 -run TestBundle

  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [security-scan, dependency-scan, code-quality-scan]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download scan results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: security-scan-results
          path: ./scan-results

      - name: Generate security summary
        run: |
          echo "# Security Scan Summary" > security-summary.md
          echo "" >> security-summary.md
          echo "## Scan Results" >> security-summary.md
          echo "" >> security-summary.md
          echo "Generated: $(date)" >> security-summary.md

          if [ -f scan-results/security-findings.json ]; then
            echo "### Findings Overview" >> security-summary.md
            TOTAL=$(jq 'length' scan-results/security-findings.json 2>/dev/null || echo "0")
            echo "- Total: $TOTAL findings" >> security-summary.md
          fi

          cat security-summary.md

      - name: Upload security report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: security-report
          path: security-summary.md
          retention-days: 90