name: Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto Merge PR
    runs-on: ubuntu-latest
    if: github.event.pull_request.auto_merge == null && github.event.pull_request.draft == false && github.event.pull_request != null
    steps:
      - name: Check if PR is mergeable
        run: |
          echo "Checking PR #${{ github.event.pull_request.number }}"
          PR_NUM=${{ github.event.pull_request.number }}
          MERGEABLE=$(gh pr view $PR_NUM --repo ${{ github.repository }} --json mergeable --jq '.mergeable')
          echo "Mergeable: $MERGEABLE"
          if [ "$MERGEABLE" != "true" ]; then
            echo "PR has conflicts or is not mergeable"
            exit 1
          fi

      - name: Wait for checks
        run: |
          echo "Waiting for checks..."
          sleep 30

      - name: Merge PR
        if: success()
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          gh pr merge $PR_NUM --repo ${{ github.repository }} --squash --delete-branch --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  handle-conflicts:
    name: Report Conflicts
    runs-on: ubuntu-latest
    if: github.event.pull_request.mergeable == 'conflicting' && github.event.pull_request != null
    steps:
      - name: Report conflicts
        run: |
          echo "PR #${{ github.event.pull_request.number }} has conflicts with main"
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} \
            --body "⚠️ This PR has merge conflicts. Please resolve them before merging."
