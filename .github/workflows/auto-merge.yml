name: Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable Auto-Merge
    runs-on: ubuntu-latest
    # Only same-repo PRs (e.g. dependabot, owner branches). Fork PRs must
    # go through explicit human review — auto-merge should never fire on
    # untrusted contributor code without a manual approval step.
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
    steps:
      - name: Check CI status checks have passed
        id: check
        run: |
          # Wait up to 15 min for all required status checks to complete (CI takes ~6 min)
          for i in $(seq 1 30); do
            # Get the head commit SHA for this PR
            pr_head_sha=$(gh api repos/${REPO}/pulls/${PR_NUMBER} --jq '.head.sha')

            # Get combined status from the commit
            status_result=$(gh api repos/${REPO}/commits/${pr_head_sha}/status --jq '.state')
            echo "Attempt $i/30: commit status=${status_result}"

            # Get mergeable_state to check for conflicts
            mergeable_state=$(gh api repos/${REPO}/pulls/${PR_NUMBER} --jq '.mergeable_state')
            echo "Attempt $i/30: mergeable_state=${mergeable_state}"

            # All required checks must pass (status=success) AND no conflicts (mergeable_state=clean)
            if [ "${status_result}" = "success" ] && [ "${mergeable_state}" = "clean" ]; then
              echo "All CI checks passed and PR is clean — proceeding with auto-merge"
              exit 0
            fi

            # If status is failed or mergeable_state is dirty, fail immediately
            if [ "${status_result}" = "failure" ]; then
              echo "CI checks have FAILED — refusing to auto-merge"
              exit 1
            fi

            if [ "${mergeable_state}" = "dirty" ]; then
              echo "PR has merge conflicts — refusing to auto-merge"
              exit 1
            fi

            echo "CI not yet passed or PR not yet mergeable — waiting 30s..."
            sleep $((20 + RANDOM % 21))
          done
          # Timeout after 30 tries (~15 min). This can happen when mergeable_state
          # is "blocked" by ruleset requirements (e.g. CodeQL, code_quality) that don't
          # report via the commit status API. CI passed (status=success) and there are
          # no conflicts (mergeable_state != dirty), so the PR is ready — exit 0
          # lets the "Enable auto-merge" step try the native GitHub auto-merge which
          # respects ruleset bypass settings (e.g. admin overrides, dependabot).
          echo "Timeout waiting for mergeable_state=clean (CI is passing) — proceeding"
          exit 0

      - name: Enable auto-merge
        if: steps.check.outcome == 'success'
        run: |
          gh pr merge "${PR_NUMBER}" \
            --repo "${REPO}" \
            --squash \
            --delete-branch \
            --auto

  report-conflicts:
    name: Report Conflicts
    runs-on: ubuntu-latest
    if: github.event.pull_request.mergeable == false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
    steps:
      - name: Comment on conflicting PR
        run: |
          gh pr comment "${PR_NUMBER}" \
            --repo "${REPO}" \
            --body "This PR has merge conflicts. Please resolve them before merging."
