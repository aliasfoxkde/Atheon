name: Sync stable/clean with upstream

# NOTE: This workflow is currently non-functional.
#
# `stable/clean` has a branch protection rule that prevents direct pushes.
# The workflow will fail at the `git push origin stable/clean` step until
# the protection is removed.
#
# Owner action required to make this workflow usable:
#   1. Settings → Branches → find the stable/clean rule → delete it
#   2. Optionally delete the stable/clean branch entirely (it has no active
#      purpose — upstream is tracked via `git fetch upstream` manually).
#
# See docs/OWNER_CHECKLIST.md → "Stale Branch Cleanup" for context.

on:
  # SCHEDULE REMOVED — syncs with upstream HoraDomu/Atheon which requires
  # manual review before merging upstream changes into this fork.
  # Only allow manual triggering.
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  sync:
    name: Sync stable/clean branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: stable/clean
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/HoraDomu/Atheon.git || true
          git fetch upstream

      - name: Merge upstream/main
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git merge upstream/main -m "Sync with upstream HoraDomu/Atheon main ($(date +%Y-%m-%d))"
          git push origin stable/clean

      - name: Validate sync completion
        run: |
          echo "Sync completed successfully"
          echo "Note: Testing skipped - HoraDomu/Atheon does not have a stable/clean branch"