name: Sync Stable Clean

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run sync script
        run: |
          chmod +x .github/scripts/sync-stable-clean.sh
          .github/scripts/sync-stable-clean.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
