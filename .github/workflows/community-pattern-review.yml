name: Community Pattern Review

on:
  pull_request:
    paths:
      - 'community/**/*.yaml'
      - 'community/**/*.yml'

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-pattern-review:
    runs-on: ubuntu-latest
    if: github.repository == 'aliasfoxkde/Atheon-Enhanced'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Get changed pattern files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'community/**/*.yaml' 'community/**/*.yml' | head -10)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Validate YAML schema
        run: |
          python3 -c "
          import sys, yaml, glob, os

          required = ['name', 'description', 'severity', 'category', 'enabled', 'pattern']
          valid_severities = ['low', 'medium', 'high', 'critical']
          errors = []

          changed = '''${{ steps.changed.outputs.files }}'''.strip().splitlines()
          for path in changed:
              path = path.strip()
              if not path or not os.path.exists(path):
                  continue
              try:
                  with open(path) as f:
                      data = yaml.safe_load(f)
                  for field in required:
                      if field not in data:
                          errors.append(f'{path}: missing required field \"{field}\"')
                  if 'severity' in data and data['severity'] not in valid_severities:
                      errors.append(f'{path}: invalid severity \"{data[\"severity\"]}\" (must be one of: {valid_severities})')
                  if 'true_positives' not in data or not data['true_positives']:
                      errors.append(f'{path}: missing true_positives test cases')
                  if 'false_positives' not in data or not data['false_positives']:
                      errors.append(f'{path}: missing false_positives test cases')
              except yaml.YAMLError as e:
                  errors.append(f'{path}: YAML parse error: {e}')

          if errors:
              print('Schema validation failed:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)
          print('Schema validation passed')
          "

      - name: AI pattern review via GitHub Models
        if: steps.changed.outputs.files != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILES="${{ steps.changed.outputs.files }}"
          REVIEW_BODY=""

          while IFS= read -r FILE; do
            FILE="$(echo "$FILE" | xargs)"
            [ -z "$FILE" ] || [ ! -f "$FILE" ] && continue

            CONTENT=$(cat "$FILE")
            RESPONSE=$(curl -sf \
              "https://models.inference.ai.azure.com/chat/completions" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg content "You are reviewing an Atheon pattern YAML file for a security scanner. Analyze it concisely (3-5 sentences max). Check: (1) Is the regex overly broad — would it match common variable names or identifiers that are NOT the target? (2) Do the true_positives cover realistic examples? (3) Do the false_positives cover common safe patterns? (4) Is the severity appropriate for the detection type? Reply with: CONCERNS (if any issues) or LGTM (if the pattern looks solid), followed by your brief analysis.\n\nPattern file: $content" \
                '{model: "gpt-4o-mini", messages: [{role: "user", content: $content}], max_tokens: 300}')" \
              2>/dev/null || echo '{"choices":[{"message":{"content":"GitHub Models API unavailable — review skipped"}}]}')

            ANALYSIS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['choices'][0]['message']['content'])" 2>/dev/null || echo "Parse error")

            REVIEW_BODY="${REVIEW_BODY}
          ### \`${FILE}\`
          ${ANALYSIS}
          "
          done <<< "$FILES"

          if [ -z "$REVIEW_BODY" ]; then
            echo "No pattern files to review"
            exit 0
          fi

          COMMENT="## AI Pattern Review

          Automated review of changed community patterns using GitHub Models (GPT-4o-mini). This is informational — human review is still required.

          ${REVIEW_BODY}

          ---
          *Generated by [community-pattern-review.yml](.github/workflows/community-pattern-review.yml) · Model: gpt-4o-mini via GitHub Models API*"

          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "$COMMENT"
