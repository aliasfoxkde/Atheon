name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          GOOS=windows GOARCH=amd64 go build -o atheon-windows-amd64.exe .
          GOOS=linux   GOARCH=amd64 go build -o atheon-linux-amd64 .
          GOOS=darwin  GOARCH=amd64 go build -o atheon-macos-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -o atheon-macos-arm64 .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            atheon-windows-amd64.exe
            atheon-linux-amd64
            atheon-macos-amd64
            atheon-macos-arm64
