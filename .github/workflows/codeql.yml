name: "CodeQL Advanced Security"

on:
  push:
    branches: [ main, fix/node-js-updates, 'infra/**' ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # Weekly deep scan

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  codeql:
    name: CodeQL Analysis (Go)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          languages: go
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: "/language:go"
          upload: true
