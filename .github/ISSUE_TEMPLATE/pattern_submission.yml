name: Pattern Submission
description: Propose a new detection pattern for the Atheon library
labels: ["pattern", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to submit a new pattern for inclusion in the Atheon bundle.
        Patterns are reviewed for accuracy, false-positive rate, and category fit before merging.

  - type: input
    id: name
    attributes:
      label: Pattern name
      description: Kebab-case, descriptive. Used as the identifier in findings.
      placeholder: "openai-project-key"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - secrets
        - pii
        - code-quality
        - devops
        - ai-detection
        - framework
        - other
    validations:
      required: true

  - type: input
    id: regex
    attributes:
      label: Regex pattern
      description: Go-compatible regular expression (`regexp` package syntax).
      placeholder: 'sk-proj-[A-Za-z0-9_\-]{48,}'
    validations:
      required: true

  - type: textarea
    id: match_examples
    attributes:
      label: Should match (true positives)
      description: One example per line. Redact real credentials — use representative fake values.
      placeholder: |
        sk-proj-aBcDeFgHiJkLmNoPqRsTuVwXyZ1234567890abcdefghij
        sk-proj-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    validations:
      required: true

  - type: textarea
    id: no_match_examples
    attributes:
      label: Should NOT match (true negatives)
      description: Values that look similar but should not trigger the pattern.
      placeholder: |
        sk-abcdef  (too short — different key type)
        my-project-key  (no recognized prefix)
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Why is this pattern valuable?
      description: What real-world credential or issue does it detect? Link to docs if applicable.
    validations:
      required: true

  - type: dropdown
    id: fp_risk
    attributes:
      label: Estimated false-positive risk
      options:
        - Low — highly specific regex, unlikely to fire on benign content
        - Medium — may fire on test fixtures or example files
        - High — intentionally broad, needs category/scope guidance
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: References, related patterns, known edge cases.
