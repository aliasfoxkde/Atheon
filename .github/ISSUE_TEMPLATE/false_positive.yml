name: False Positive Report
description: A pattern is firing on content it shouldn't
labels: ["false-positive", "pattern", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        False positive reports directly improve pattern quality. Please include as much detail as you can — the matching line is the most important piece.

  - type: input
    id: pattern
    attributes:
      label: Pattern name
      description: Run `atheon list` or check the finding output for the pattern name.
      placeholder: "travis-ci-token"
    validations:
      required: true

  - type: textarea
    id: match_content
    attributes:
      label: What was matched?
      description: Paste the line that triggered the pattern. Redact real credentials if needed.
      placeholder: "if enabled {"
    validations:
      required: true

  - type: input
    id: file_type
    attributes:
      label: File type / extension
      placeholder: ".go, .yaml, .env, Makefile..."
    validations:
      required: true

  - type: textarea
    id: why_fp
    attributes:
      label: Why is this a false positive?
      description: What is the content actually doing? Why should it not match?
      placeholder: The line is a Go conditional, not a CI token. The regex is too broad...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Atheon version
      placeholder: "v1.2.0-enhanced  (run: atheon --version)"
    validations:
      required: true

  - type: textarea
    id: suggested_fix
    attributes:
      label: Suggested fix (optional)
      description: Narrower regex, confidence adjustment, scope exclusion, etc.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
