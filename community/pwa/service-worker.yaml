name: service-worker
match: 'cache.*addAll.*urls.*100\+|fetch.*respondWith.*cache.*match.*network|skipWaiting\(\).*clients\.claim'
severity: medium
language: javascript
category: pwa
description: |
  Service worker implementation patterns that impact offline functionality,
  performance, and user experience.

  Examples:
  - cache.addAll(urls) with 100+ URLs on install
  - cache-first strategy for dynamic content
  - Missing skipWaiting() and clients.claim() in update flow

  Issues:
  - Caching too many URLs on install
  - Wrong caching strategy for content type
  - Missing service worker update flow
  - Poor cache management

  Better patterns:
  - Cache critical resources only on install
  - Use appropriate caching strategies
  - Implement proper update flow
  - Handle offline scenarios gracefully

  Mitigation:
  - Use cache-first for static assets
  - Use network-first for dynamic content
  - Implement stale-while-revalidate for balance
  - Provide offline fallback pages
references:
  - https://developer.mozilla.org/en-US/docs/Web/API/Service_Worker_API
  - https://web.dev/service-worker-lifecycle/