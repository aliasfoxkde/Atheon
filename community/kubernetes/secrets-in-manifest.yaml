name: secrets-in-manifest
match: (?i)(apiVersion:\s*v1\s*\n\s*kind:\s*Secret|secretKeyRef|data:\s*\n\s*  [a-zA-Z_]+:\s*['"][^'"]+['"])
severity: high
enabled: true
description: 'Pattern: ''secrets in K8s manifest''. Pattern in category ''kubernetes''. Detects secrets defined directly in Kubernetes manifests rather than using external secrets management.'