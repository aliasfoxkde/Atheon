name: error-handling
match: 'try.*fetch.*catch.*console\.log|response\.ok.*throw|fetch.*catch.*null'
severity: high
language: javascript
category: api-integration
description: |
  Poor API error handling patterns that impact user experience
  and application reliability.

  Examples:
  - try { fetch() } catch (e) { console.log(e) }
  - if (response.ok) { throw error } (missing HTTP status handling)
  - fetch().catch(() => null) (silently ignoring errors)

  Issues:
  - Errors only logged, not handled
  - Missing HTTP error status handling
  - Silent failures hide problems
  - Poor user experience

  Better patterns:
  - Implement proper error boundaries
  - Handle different HTTP status codes
  - Show user-friendly error messages
  - Implement retry logic

  Mitigation:
  - Catch and handle all error states
  - Implement retry with exponential backoff
  - Show appropriate error messages
  - Log errors for debugging
references:
  - https://developer.mozilla.org/en-US/docs/Web/API/Fetch_API
  - https://web.dev/fetch-best-practices/