name: graphql
match: 'query.*\{.*\{.*\{.*\}|useQuery.*\[\].*staleTime.*0|mutation.*refetchQueries'
severity: medium
language: javascript
category: api-integration
description: |
  GraphQL API integration patterns that impact performance,
  caching, and user experience.

  Examples:
  - Deeply nested GraphQL queries (5+ levels)
  - Zero staleTime causes excessive requests
  - Mutation without cache update strategy

  Issues:
  - Deep nesting causes performance issues
  - Missing cache optimization
  - Poor cache invalidation
  - Excessive data fetching

  Better patterns:
  - Flatten queries when possible
  - Use appropriate staleTime values
  - Implement proper cache updates
  - Use fragments for reusability

  Mitigation:
  - Monitor query complexity
  - Implement proper caching strategies
  - Use optimistic updates
  - Implement request batching
references:
  - https://graphql.org/learn/best-practices/
  - https://www.apollographql.com/docs/react/caching/overview/