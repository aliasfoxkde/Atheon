name: inaccessible-modal-dialogs
match: dialog.*role.*dialog.*no.*aria-modal|modal.*no.*focus.*trap|dialog.*no.*escape.*close
severity: high
language: javascript
category: accessibility
description: 'Pattern: ''inaccessible modal dialogs''. Accessibility issue that may
