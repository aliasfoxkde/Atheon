name: incorrect-heading-hierarchy
match: <h1>.*<h3>|<h2>.*<h4>|skipped.*heading.*level|h[1-6].*followed.*h[4-6]
severity: medium
language: html
category: accessibility
description: 'Pattern: ''incorrect heading hierarchy''. Accessibility issue that may
  prevent users with disabilities from using the application effectively. This is
  a medium-severity issue representing a moderate risk to security, privacy, or code
  quality.'
