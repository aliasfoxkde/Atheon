name: keyboard-navigation
match: 'onClick.*onKeyPress.*false'
severity: high
language: javascript
category: accessibility
description: |
  Interactive elements with click handlers but missing keyboard support
  prevent keyboard-only users from accessing functionality.

  Examples:
  - <div onClick={handleSubmit}>Submit</div> (missing keyboard handler)
  - onKeyPress={e => e.key === 'Enter' && action()} (use onKeyDown instead)
  - event.key === 'Enter' should use event.key === 'Enter' || event.key === ' '

  Mitigation:
  - Add onKeyDown handler for Enter/Space keys
  - Use semantic HTML elements (<button> instead of <div>)
  - Ensure proper tabIndex management
  - Test keyboard navigation without mouse

  Better implementation:
  - Use <button> instead of <div onClick>
  - Add onKeyDown: onKeyDown={(e) => { if (e.key === 'Enter') action(); }}
  - Include both mouse and keyboard event handlers

  WCAG Criteria:
  - 2.1.1 Keyboard (Level A)
  - 2.1.3 Keyboard Trap (Level A)
  - 2.4.3 Focus Order (Level A)
references:
  - https://www.w3.org/WAI/WCAG21/Understanding/keyboard.html
  - https://web.dev/accessible-keyboard-navigation/