name: semantic-html
match: '<div[^>]*role="button"|<div[^>]*class=".*header.*"|<span[^>]*class=".*navigation.*"'
severity: medium
language: html
category: accessibility
description: |
  Non-semantic HTML elements with ARIA roles should use native semantic
  elements for better accessibility and browser support.

  Examples:
  - <div role="button">Click me</div> (Use <button> instead)
  - <div class="header">Title</div> (Use <header> instead)
  - <span class="navigation">Links</span> (Use <nav> instead)

  Issues:
  - Reduced accessibility compared to semantic elements
  - Requires more ARIA attributes for proper behavior
  - Poor browser support for screen readers
  - Violates semantic HTML principles

  Better alternatives:
  - <button> instead of <div role="button">
  - <header> instead of <div class="header">
  - <nav> instead of <span class="navigation">
  - <main> instead of <div id="main">

  Benefits:
  - Built-in accessibility features
  - Better SEO and semantic structure
  - Improved screen reader support
  - Native keyboard interaction

  WCAG Criteria:
  - 1.3.1 Info and Relationships (Level A)
  - 4.1.2 Name, Role, Value (Level A)
references:
  - https://www.w3.org/TR/html5/sections.html
  - https://web.dev/semantic-html/