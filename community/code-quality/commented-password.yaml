name: commented-password
match: (?im)(#.*password.*[:=]\s*['"][^'"]+['"]|//.*password.*[:=]\s*['"][^'"]+['"]|/\*.*password.*[:=]\s*['"][^'"]+['"])
severity: medium
enabled: true
description: 'Pattern: ''commented password''. Pattern in category ''code-quality''. Detects passwords or secrets in code comments.'