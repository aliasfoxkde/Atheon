name: magic-number
match: (?i)\b(?:86400|3600|1000|65535|1024|256|128|64|32|16|8|4|2|1)\b
severity: low
enabled: true
description: 'Detects common magic numbers (86400 seconds/day, 1024 bytes/KB, 65535 max unsigned 16-bit, etc.) that should be replaced with named constants for readability and maintainability.'
