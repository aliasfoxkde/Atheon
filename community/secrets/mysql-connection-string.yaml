name: mysql-connection-string
match: mysql://[A-Za-z0-9_:-]+@[A-Za-z0-9.-]+:[0-9]+/[A-Za-z0-9_]+
severity: high
description: 'Detected potential SQL injection risk: ''mysql connection string''.
  User input should be properly sanitized before use in database queries. This is
  a high-severity issue that could lead to security vulnerabilities or significant
  quality problems.'
