name: digitalocean-api-token
match: \b(dop_v1|dopv1)_[a-f0-9]{64}\b
severity: high
enabled: true
description: 'Detected potential API key or token: ''digitalocean api token''. Exposing
  API keys in source code risks unauthorized API access. This is a high-severity issue
  that could lead to security vulnerabilities or significant quality problems.'
