name: travis-ci-token
match: (?i)(?:travis[_-](?:ci[_-])?(?:api[_-])?token|TRAVIS_TOKEN)\s*[:=]\s*['"]?[A-Za-z0-9]{20,40}['"]?
severity: high
enabled: true
description: 'Detected potential API key or token: ''travis ci token''. Exposing API
  keys in source code risks unauthorized API access. This is a high-severity issue
  that could lead to security vulnerabilities or significant quality problems.'
