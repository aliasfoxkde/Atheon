name: anthropic-api-key
match: \bsk-ant-api[0-9]{2}-[A-Za-z0-9_\-]{93,}\b
severity: high
enabled: true
description: 'Detected potential API key or token: ''anthropic api key''. Exposing
  API keys in source code risks unauthorized API access. This is a high-severity issue
  that could lead to security vulnerabilities or significant quality problems.'
