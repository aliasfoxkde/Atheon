name: npm-auth-token
match: //registry\.npmjs\.org/:_authToken\s*=\s*[a-zA-Z0-9_-]{36,}
severity: high
description: 'Detected potential API key or token: ''npm auth token''. Exposing API
  keys in source code risks unauthorized API access. This is a high-severity issue
  that could lead to security vulnerabilities or significant quality problems.'
