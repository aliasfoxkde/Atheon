name: sqlserver-connection-string
match: Server=[A-Za-z0-9.-]+,[0-9]+;Database=[A-Za-z0-9_]+;User Id=[A-Za-z0-9_]+;Password=[^;]+
severity: high
description: 'Detected potential SQL injection risk: ''sqlserver connection string''.
  User input should be properly sanitized before use in database queries. This is
  a high-severity issue that could lead to security vulnerabilities or significant
  quality problems.'
