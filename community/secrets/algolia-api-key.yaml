name: algolia-api-key
match: \b(algolia|algolia_admin)_api_key\s*[:=]\s*["\x27][A-Za-z0-9]{32}["\x27]\b
severity: high
enabled: true
description: 'Detected potential API key or token: ''algolia api key''. Exposing API
  keys in source code risks unauthorized API access. This is a high-severity issue
  that could lead to security vulnerabilities or significant quality problems.'
