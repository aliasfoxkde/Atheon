name: planetscale-api-token
match: \bpscale_tkn_[A-Za-z0-9_\-]{32,}\b
severity: high
enabled: true
description: 'Detected potential API key or token: ''planetscale api token''. Exposing
  API keys in source code risks unauthorized API access. This is a high-severity issue
  that could lead to security vulnerabilities or significant quality problems.'
