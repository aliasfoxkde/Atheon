name: heroku-api-key
# Heroku API keys are UUIDs, so a bare UUID regex is a shotgun — it
# matches every UUID-shaped string in the codebase (request IDs, k8s
# resource IDs, etc.). Require Heroku-specific context: the env var
# assignment, the CLI flag form, or the OAuth header. The non-capturing
# group keeps the match position on the UUID itself so SARIF / JSON
# output points at the secret, not at "HEROKU_API_KEY=".
match: '(?:HEROKU_API_KEY|heroku_auth|heroku-api-key)\s*[=:]\s*["\x27]?[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}'
severity: high
enabled: true