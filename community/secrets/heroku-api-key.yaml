name: heroku-api-key
match: (?:HEROKU_API_KEY|heroku_auth|heroku-api-key)\s*[=:]\s*["\x27]?[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}
severity: high
enabled: true
description: 'Detected potential API key or token: ''heroku api key''. Exposing API
  keys in source code risks unauthorized API access. This is a high-severity issue
  that could lead to security vulnerabilities or significant quality problems.'
