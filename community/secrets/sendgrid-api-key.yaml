name: sendgrid-api-key
match: \bSG\.[A-Za-z0-9\-_]{22}\.[A-Za-z0-9\-_]{43}\b
severity: high
enabled: true
description: 'Detected potential API key or token: ''sendgrid api key''. Exposing
  API keys in source code risks unauthorized API access. This is a high-severity issue
  that could lead to security vulnerabilities or significant quality problems.'
