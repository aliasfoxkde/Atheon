name: azure-service-principal-secret
match: '[a-zA-Z0-9_.-]{5,30}@onmicrosoft\.com'
severity: high
description: 'Detected potential secret or credential: ''azure service principal secret''.
  Exposing secrets in source code risks unauthorized access if the code is committed
  to version control. Use environment variables, secret managers, or .env files instead.
  This is a high-severity issue that could lead to security vulnerabilities or significant
  quality problems.'
