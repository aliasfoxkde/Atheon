name: discord-bot-token
match: \b[MN][A-Za-z0-9_\-]{23}\.[A-Za-z0-9_\-]{6}\.[A-Za-z0-9_\-]{27,}\b
severity: high
enabled: true
description: 'Detected potential API key or token: ''discord bot token''. Exposing
  API keys in source code risks unauthorized API access. This is a high-severity issue
  that could lead to security vulnerabilities or significant quality problems.'
