name: vercel-token
match: (?i)(?:VERCEL_TOKEN|vercel.?token)\s*[=:]\s*[A-Za-z0-9_]{24}
severity: high
enabled: true
description: 'Detected potential API key or token: ''vercel token''. Exposing API
  keys in source code risks unauthorized API access. This is a high-severity issue
  that could lead to security vulnerabilities or significant quality problems.'
