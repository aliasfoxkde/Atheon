name: firebase-api-key
match: \bapiKey\s*[:=]\s*["\x27][A-Za-z0-9_-]{20,40}["\x27]\b
severity: high
enabled: true
description: 'Detected potential API key or token: ''firebase api key''. Exposing
  API keys in source code risks unauthorized API access. This is a high-severity issue
  that could lead to security vulnerabilities or significant quality problems.'
