name: gcp-service-account-key
match: (?:"private_key_id"\s*:\s*"[0-9a-f]{40}"|"client_email"\s*:\s*"[^"]+@[^"]+\.iam\.gserviceaccount\.com")
severity: high
description: 'Detected potential API key or token: ''gcp service account key''. Exposing
  API keys in source code risks unauthorized API access. This is a high-severity issue
  that could lead to security vulnerabilities or significant quality problems.'
