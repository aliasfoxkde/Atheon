name: docker-auth-config
match: '"auths"\s*:\s*\{[^}]*"auth"\s*:\s*"[A-Za-z0-9+/]{32,}={0,2}"[^}]*\}'
severity: high
description: 'Pattern: ''docker auth config''. Pattern in category ''''. This is a
  high-severity issue that could lead to security vulnerabilities or significant quality
  problems.'
