name: circleci-personal-token
# DEPRECATED: This pattern fires on every 40-char hex string (SHAs, UUIDs, k8s IDs).
# CircleCI tokens do not have a reliable distinguishing prefix or format.
# Detection requires additional context (env var name, assignment pattern).
# See: https://github.com/aliasfoxkde/Atheon-Enhanced/discussions/secrets
match: '(?i)circleci.?(?:personal|api|token)\s*[=:]\s*[a-f0-9]{40}'
severity: high
enabled: false
