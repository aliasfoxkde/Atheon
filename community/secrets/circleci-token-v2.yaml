name: circleci-personal-token
match: (?i)circleci.?(?:personal|api|token)\s*[=:]\s*[a-f0-9]{40}
severity: high
enabled: false
description: 'Detected potential API key or token: ''circleci personal token''. Exposing
  API keys in source code risks unauthorized API access. This is a high-severity issue
  that could lead to security vulnerabilities or significant quality problems.'
