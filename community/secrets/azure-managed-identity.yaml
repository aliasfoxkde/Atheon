name: azure-managed-identity-token
match: \beyJ[0-9a-zA-Z_-]+\.[0-9a-zA-Z_-]+\.[0-9a-zA-Z_-]+\b
severity: high
description: 'Detected potential API key or token: ''azure managed identity token''.
  Exposing API keys in source code risks unauthorized API access. This is a high-severity
  issue that could lead to security vulnerabilities or significant quality problems.'
