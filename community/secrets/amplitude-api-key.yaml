name: amplitude-api-key
match: \bamplitude(-|_)(api_)?key\s*[:=]\s*["\x27][A-Fa-f0-9]{32}["\x27]\b
severity: high
enabled: true
description: 'Detected potential API key or token: ''amplitude api key''. Exposing
  API keys in source code risks unauthorized API access. This is a high-severity issue
  that could lead to security vulnerabilities or significant quality problems.'
