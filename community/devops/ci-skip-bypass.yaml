name: ci-skip-bypass
match: \[(?:skip\s+ci|ci\s+skip|no\s+ci|skip\s+tests?)\]
severity: medium
enabled: true
description: 'Detected potential CI/security bypass: ''ci skip bypass''. Bypass mechanisms
  should be carefully reviewed and avoided in production. This is a medium-severity
  issue representing a moderate risk to security, privacy, or code quality.'
