name: github-actions-hardcoded-secret
match: (?i)(?:password|token|secret|key)\s*:\s*['"][^'"\$\{\s]{8,}['"]
severity: medium
enabled: true
description: 'Detected potential secret or credential: ''github actions hardcoded
  secret''. Exposing secrets in source code risks unauthorized access if the code
  is committed to version control. Use environment variables, secret managers, or
  .env files instead. This is a medium-severity issue representing a moderate risk
  to security, privacy, or code quality.'
