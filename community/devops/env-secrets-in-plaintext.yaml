name: env-secrets-in-plaintext
match: env:\s*\n\s*\w+:\s*\$\{\{\s*secrets\.\w+\s*\}\}.*\n\s*run:\s*.*echo.*\$\{\{
severity: high
enabled: true
description: 'Pattern: env-secrets-in-plaintext — Detects environment variables containing secrets being printed or logged. Secret values should never appear in workflow logs.'