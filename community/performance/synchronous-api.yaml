name: synchronous-api
match: 'fs\.readFileSync|fs\.writeFileSync|child_process\.spawnSync'
severity: high
language: javascript
category: performance
description: |
  Synchronous file system and process operations block the event loop,
  causing performance issues and poor user experience.

  Examples:
  - const data = fs.readFileSync('file.json') (Blocks entire process)
  - fs.writeFileSync('output.txt', data) (Blocks during write)
  - child_process.spawnSync('command') (Blocks during command execution)

  Impact:
  - Blocks event loop, preventing other operations
  - Causes poor performance under load
  - Creates poor user experience with frozen UI
  - Can cause cascading performance issues

  Better alternatives:
  - Use fs.promises.readFile()/writeFile()
  - Use fs.readFile()/writeFile() with callbacks
  - Use async/await for cleaner code
  - Use worker threads for CPU-intensive operations

  Mitigation:
  - Replace all sync operations with async equivalents
  - Use streams for large file operations
  - Implement proper error handling
  - Consider worker threads for heavy computations
references:
  - https://nodejs.org/api/fs.html
  - https://nodejs.org/en/docs/guides/dont-block-the-event-loop/