name: hardcoded-secrets
match: password.*=.*\=|api_key.*=.*=|secret.*=.*=|token.*=.*=
severity: critical
language: python
category: security-hardening
description: 'Detected potential secret or credential: ''hardcoded secrets''. Exposing
  secrets in source code risks unauthorized access if the code is committed to version
  control. Use environment variables, secret managers, or .env files instead. This
  is a critical security issue that could lead to data breaches or system compromise.'
