name: docker-env-secret
match: ENV\s+(PASSWORD|SECRET|API_KEY|TOKEN|PASS)\s+\S+
severity: high
description: 'Detected potential secret or credential: ''docker env secret''. Exposing
  secrets in source code risks unauthorized access if the code is committed to version
  control. Use environment variables, secret managers, or .env files instead. This
  is a high-severity issue that could lead to security vulnerabilities or significant
  quality problems.'
