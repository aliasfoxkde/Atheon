name: authentication
match: 'bcrypt.*hash.*password.*compare|JWT.*verify.*secret|session.*secret.*default'
severity: critical
language: javascript
category: security-hardening
description: |
  Authentication implementation vulnerabilities that compromise
  user security and session management.

  Examples:
  - Using bcrypt.compare for direct password comparison
  - JWT verification without proper key validation
  - Default session secrets in production

  Security issues:
  - Timing attacks in password comparison
  - Weak JWT validation
  - Predictable session keys
  - Missing authentication best practices

  Better patterns:
  - Use proper timing-constant comparison
  - Validate JWT signatures and claims
  - Use strong, random session secrets
  - Implement proper session expiration

  Mitigation:
  - Use crypto.timingSafeEqual() for comparisons
  - Validate all JWT claims properly
  - Generate secure random session secrets
  - Implement multi-factor authentication

  OWASP Category: A07:2021 – Identification and Authentication Failures
  CWE: CWE-287, CWE-384
references:
  - https://owasp.org/Top10/A07_2021_Identification_and_Authentication_Failures/
  - https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html