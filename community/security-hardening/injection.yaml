name: injection
match: '\+\s*\$.*\+.*\$|innerHTML.*request\.|innerHTML.*location\.|eval\s*\('
severity: critical
language: javascript
category: security-hardening
description: |
  Code injection vulnerabilities that allow attackers to execute arbitrary code.

  Examples:
  - query += "WHERE name = '" + userInput + "'" (SQL injection)
  - element.innerHTML = request.params.input (XSS)
  - eval(userInput) (Code injection)
  - setTimeout(userFunction, 1000) (Injection via setTimeout)

  Attack vectors:
  - SQL Injection: ' OR '1'='1
  - XSS: <script>alert('XSS')</script>
  - Command Injection: ; rm -rf /
  - LDAP Injection: *(|(mail=*))

  Mitigation:
  - Use parameterized queries/prepared statements
  - Use textContent instead of innerHTML
  - Avoid eval() and Function() constructor
  - Validate and sanitize all user inputs
  - Use Content Security Policy (CSP)
  - Implement proper input validation and output encoding

  OWASP Category: A03:2021 – Injection
  CWE: CWE-78, CWE-89, CWE-94
references:
  - https://owasp.org/Top10/A03_2021-Injection/
  - https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html