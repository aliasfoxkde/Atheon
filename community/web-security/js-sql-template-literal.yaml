name: js-sql-template-literal
match: (?:query|execute)\s*=\s*`[^`]*\$\{[^}]*\}[^`]*`
severity: high
description: 'Detected potential SQL injection risk: ''js sql template literal''.
  User input should be properly sanitized before use in database queries. This is
  a high-severity issue that could lead to security vulnerabilities or significant
  quality problems.'
