name: kubernetes-secret-ref
match: '(?i)secretKeyRef:'
severity: medium
enabled: true
description: 'Detected potential secret or credential: ''kubernetes secret ref''.
  Exposing secrets in source code risks unauthorized access if the code is committed
  to version control. Use environment variables, secret managers, or .env files instead.
  This is a medium-severity issue representing a moderate risk to security, privacy,
  or code quality.'
