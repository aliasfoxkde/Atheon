name: k8s-imagepullsecret
match: imagePullSecrets:\s*\n\s*-\s*name:\s*[a-zA-Z0-9._-]+
severity: medium
enabled: true
description: 'Detected potential secret or credential: ''k8s imagepullsecret''. Exposing
  secrets in source code risks unauthorized access if the code is committed to version
  control. Use environment variables, secret managers, or .env files instead. This
  is a medium-severity issue representing a moderate risk to security, privacy, or
  code quality.'
