name: kubernetes
match: 'imagePullPolicy.*Always|resources:.*limits.*memory.*128Mi|replicas:.*1'
severity: medium
language: yaml
category: cloud-native
description: |
  Kubernetes deployment patterns that impact reliability, performance,
  and resource utilization.

  Examples:
  - imagePullPolicy: Always (Causes rate limiting)
  - resources.limits.memory: 128Mi (Very low limits)
  - replicas: 1 (No high availability)

  Issues:
  - Always pull images causes Docker Hub rate limits
  - Low memory limits cause OOM kills
  - Single replica provides no HA
  - Missing resource requests

  Better patterns:
  - Use imagePullPolicy: IfNotPresent
  - Set appropriate resource limits based on usage
  - Use HPA for autoscaling
  - Implement pod disruption budgets

  Mitigation:
  - Test resource requirements locally
  - Use resource quotas and limits
  - Implement health checks and liveness probes
  - Use namespaces and network policies
references:
  - https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
  - https://kubernetes.io/docs/concepts/workloads/controllers/deployment/