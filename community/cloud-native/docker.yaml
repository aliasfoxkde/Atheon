name: docker
match: 'FROM.*latest|RUN.*apt-get.*upgrade|ADD.*http'
severity: medium
language: dockerfile
category: cloud-native
description: |
  Docker and containerization anti-patterns that impact reproducibility,
  security, and performance.

  Examples:
  - FROM node:latest (Unreproducible builds)
  - RUN apt-get upgrade ( breaks caching)
  - ADD http://example.com/file.tar.gz (Use URL in ADD)

  Issues:
  - Latest tag breaks reproducibility
  - Package upgrades in Dockerfile
  - Deprecated ADD command usage
  - Missing security scanning

  Better patterns:
  - Use specific version tags: FROM node:18-alpine
  - Use apt-get install with --no-install-recommends
  - Use COPY instead of ADD for local files
  - Multi-stage builds for smaller images

  Mitigation:
  - Pin specific image versions
  - Use .dockerignore to reduce context
  - Implement security scanning
  - Optimize layer caching
references:
  - https://docs.docker.com/develop/develop-images/dockerfile_best-practices/
  - https://snyk.io/blog/10-docker-image-security-best-practices/