name: nodejs-todo-development
match: (?i)(console\.log.*todo|\/\/\s*TODO.*fixme|FIXME.*console\.log)
severity: low
description: 'Detected TODO/FIXME comment: ''nodejs todo development''. Pending tasks
  should be tracked in an issue tracker rather than left in code. This is a low-severity
  issue representing a minor risk or code quality concern.'
