name: react-missing-key-prop
# Heuristic: .map() returning JSX without a key prop. RE2 doesn't support
# lookahead, so this matches the .map() call site; downstream tooling can
# combine with file context to filter false positives.
match: '\.\s*map\s*\([^)]*\)\s*=>\s*[<\(]'
severity: low
enabled: false