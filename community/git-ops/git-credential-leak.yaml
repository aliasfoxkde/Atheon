name: git-credential-leak
match: (?i)(git\s+config\s+--local\s+credential\.helper|git\s+clone\s+https?://[^@]+@|url\s*=\s*https?://[^:]+:[^@]+@)
severity: critical
enabled: true
description: 'Pattern: ''git credential leak''. Pattern in category ''git-ops''. Detects git credentials exposed in scripts or URLs.'