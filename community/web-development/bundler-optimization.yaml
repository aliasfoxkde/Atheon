name: bundler-optimization
match: 'import.*\*.*from|require.*dynamic.*import|import.*\(?.*await'
severity: low
language: javascript
category: web-development
description: |
  Bundle optimization patterns that impact application size,
  performance, and loading times.

  Examples:
  - import * as library from 'library'
  - Mixing require() and dynamic import()
  - Dynamic import without proper error handling

  Issues:
  - Tree-shaking incompatible imports
  - Mixed module systems
  - Poor code splitting
  - Missing lazy loading

  Better patterns:
  - Use named imports: import { specific } from 'library'
  - Consistent module system (ESM or CommonJS)
  - Implement code splitting
  - Use React.lazy() for route splitting

  Mitigation:
  - Analyze bundle size regularly
  - Implement proper code splitting
  - Use webpack-bundle-analyzer
  - Implement tree-shaking friendly imports
references:
  - https://webpack.js.org/guides/code-splitting/
  - https://web.dev/fast/