name: nextjs
match: 'useEffect.*\[\].*fetch|export default.*function.*props|getStaticPaths.*fallback.*false'
severity: medium
language: javascript
category: web-development
description: |
  Common Next.js anti-patterns that impact performance, SEO, and user experience.

  Examples:
  - useEffect(() => { fetch('/api/data') }, []) (Should use getStaticProps/getServerSideProps)
  - export default function ExpensiveComponent(props) (Missing React.memo)
  - getStaticPaths({ fallback: false }) (May return 404 for new pages)

  Issues:
  - Client-side data fetching when server-side would be better
  - Missing React.memo for expensive re-renders
  - Incorrect fallback strategy for static generation
  - Missing image optimization with next/image

  Better patterns:
  - Use getStaticProps for static data fetching
  - Use getServerSideProps for dynamic data
  - Wrap expensive components in React.memo()
  - Use next/image for automatic optimization
  - Implement proper caching strategies

  Performance impact:
  - Slower initial page loads
  - Poor SEO with client-side only data
  - Unnecessary re-renders and performance issues
  - Missing static page benefits
references:
  - https://nextjs.org/docs/basic-features/data-fetching
  - https://nextjs.org/docs/advanced-features/image-optimization