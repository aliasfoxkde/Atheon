version: 2

before:
  hooks:
    - go mod tidy
    - go run ./bundler

builds:
  - id: atheon-mcp
    env:
      - CGO_ENABLED=0
    main: ./cmd/mcp
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    binary: atheon-mcp
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "atheon-mcp-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: aliasfoxkde
    name: Atheon-Enhanced
  skip: false

brews:
  - name: atheon-mcp
    repository:
      owner: aliasfoxkde
      name: homebrew-atheon-enhanced
      token: "{{ .Env.GH_PAT }}"
    homepage: "https://github.com/aliasfoxkde/Atheon-Enhanced"
    description: "Pattern matching engine for secrets/PII detection with MCP server support"
    license: "MIT"
    install: |
      bin.install "atheon-mcp"
    test: |
      system "#{bin}/atheon-mcp", "--help"
